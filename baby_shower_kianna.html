<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #fdf0f5 0%, #fff8fb 50%, #f5edf9 100%);
    min-height: 100vh;
    font-family: Lato, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(180,100,150,0.15);
    max-width: 460px;
    width: 100%;
    overflow: hidden;
    text-align: center;
  }
  .invitation-img {
    width: 100%;
    display: block;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .invitation-img:hover { opacity: 0.93; }
  .content { padding: 28px 32px 32px; }

    font-weight: 300;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #b07aab;
    margin-bottom: 10px;
  }
  .title {
    font-family: "DM Serif Display", serif;
    font-size: 22px;
    color: #6b3d7a;
    margin-bottom: 24px;
  }
  .divider {
    width: 60px;
    height: 1.5px;
    background: linear-gradient(90deg, #e6b8d6, #c89fd4);
    margin: 0 auto 24px;
    border-radius: 2px;
  }
  .btn-group { display: flex; flex-direction: column; gap: 12px; }
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: scale(0.97); }
  .btn-amazon {
    background: #f0a500;
    color: #fff;
    box-shadow: 0 4px 18px rgba(240,165,0,0.3);
  }
  .btn-amazon:hover { box-shadow: 0 6px 24px rgba(240,165,0,0.4); }
  .btn-location {
    background: #d4498c;
    color: #fff;
    box-shadow: 0 4px 18px rgba(212,73,140,0.3);
  }
  .btn-location:hover { box-shadow: 0 6px 24px rgba(212,73,140,0.4); }
  .footer-note { margin-top: 22px; font-size: 11.5px; color: #bba0c5; letter-spacing: 0.03em; }
