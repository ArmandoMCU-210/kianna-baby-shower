<style>
  :root {
    --gold:       #c9952a;
    --gold-light: #e8c46a;
    --gold-pale:  #fdf4e3;
    --purple:     #7b35a0;
    --purple-dark:#4e1f6b;
    --pink:       #e04a8e;
    --pink-light: #f7b8d8;
    --cream:      #fffdf9;
    --text-dark:  #3a1a4e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(230,190,210,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(180,130,220,0.20) 0%, transparent 50%);
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-x: hidden;
  }

  /* ── Confetti dots (decorative) ── */
  body::before, body::after {
    content: '';
    position: fixed;
    top: 0; bottom: 0;
    width: 60px;
    background-image: radial-gradient(circle, var(--gold) 2px, transparent 2px);
    background-size: 18px 18px;
    opacity: 0.28;
    pointer-events: none;
    animation: shimmer 4s ease-in-out infinite alternate;
  }
  body::before { left: 0; }
  body::after  { right: 0; }

  @keyframes shimmer {
    from { opacity: 0.18; }
    to   { opacity: 0.38; }
  }

  /* ── Card wrapper: gradient border sin artefactos ── */
  .card-wrapper {
    max-width: 460px;
    width: 100%;
    border-radius: 30px;
    padding: 3px;
    background: linear-gradient(90deg, var(--pink), var(--gold), var(--purple), var(--gold), var(--pink));
    background-size: 300% 100%;
    animation: gradientMove 4s linear infinite, cardIn 0.7s cubic-bezier(.22,1,.36,1) both;
    box-shadow:
      0 12px 50px rgba(100,40,140,0.18),
      0 4px 16px rgba(200,150,40,0.15);
  }

  @keyframes gradientMove {
    0%   { background-position: 0%   50%; }
    100% { background-position: 300% 50%; }
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)  scale(1);     }
  }

  /* ── Card ── */
  .card {
    background: #fff;
    border-radius: 27px;
    width: 100%;
    overflow: hidden;
    text-align: center;
    position: relative;
  }

  /* ── Invitation image ── */
  .invitation-img {
    width: 100%;
    display: block;
    cursor: pointer;
    transition: opacity 0.25s, transform 0.25s;
  }
  .invitation-img:hover {
    opacity: 0.93;
    transform: scale(1.012);
  }

  /* ── Content area ── */
  .content {
    padding: 26px 32px 34px;
    position: relative;
  }

  /* Decorative butterfly SVG behind content */
  .bg-butterfly {
    position: absolute;
    top: 10px; right: 14px;
    opacity: 0.07;
    pointer-events: none;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 700;
    margin-bottom: 18px;
  }

  /* ── Gold divider with butterfly ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0 auto 22px;
    justify-content: center;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
    max-width: 80px;
  }
  .divider svg { opacity: 0.6; }

  /* ── Buttons ── */
  .btn-group { display: flex; flex-direction: column; gap: 11px; }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 50px;
    text-decoration: none;
    font-weight: 700;
    font-size: 13.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn:hover  { transform: translateY(-2px); }
  .btn:active { transform: scale(0.97); }

  /* Gold gradient button */
  .btn-amazon {
    background: linear-gradient(135deg, #d4a43a 0%, #c9952a 50%, #b87e1a 100%);
    color: #fff;
    box-shadow: 0 4px 18px rgba(201,149,42,0.4);
  }
  .btn-amazon:hover { box-shadow: 0 7px 28px rgba(201,149,42,0.55); }

  /* Pink/purple gradient button */
  .btn-location {
    background: linear-gradient(135deg, #e04a8e 0%, #c03580 50%, #8b24a0 100%);
    color: #fff;
    box-shadow: 0 4px 18px rgba(180,52,128,0.35);
  }
  .btn-location:hover { box-shadow: 0 7px 28px rgba(180,52,128,0.50); }

  /* ── Footer ── */
  .footer-note {
    margin-top: 20px;
    font-size: 11px;
    color: #b8a0c8;
    letter-spacing: 0.06em;
    line-height: 1.6;
  }
  .footer-note strong {
    color: var(--gold);
    font-weight: 700;
  }
</style>
