  <!-- Pre-carga la imagen de portada lo antes posible -->
  <link rel="preload" as="image" href="invitation.jpg" fetchpriority="high">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --gold:       #c9952a;
      --gold-light: #e8c46a;
      --purple:     #7b35a0;
      --pink:       #e04a8e;
      --cream:      #fffdf9;
      --text:       #3a1a4e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 15% 20%, rgba(230,190,210,.22) 0%, transparent 55%),
        radial-gradient(ellipse at 85% 80%, rgba(180,130,220,.18) 0%, transparent 55%);
      font-family: 'Lato', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Tarjeta ── */
    .card {
      max-width: 440px;
      width: 100%;
      background: #fff;
      border-radius: 24px;
      overflow: hidden;
      text-align: center;
      box-shadow:
        0 2px 0  rgba(201,149,42,.35),   /* borde inferior dorado */
        0 16px 48px rgba(100,40,140,.16),
        0  4px 16px rgba(200,150,40,.12);
      outline: 1.5px solid rgba(201,149,42,.25);
      animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Imagen de invitación ── */
    .invite-img {
      width: 100%;
      display: block;
      cursor: pointer;
      transition: opacity .2s, transform .2s;
    }
    .invite-img:hover { opacity: .94; transform: scale(1.008); }

    /* ── Contenido ── */
    .content { padding: 22px 28px 30px; }

    .label {
      font-size: 10.5px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* Separador */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 18px;
    }
    .divider-line {
      flex: 1;
      max-width: 72px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-light, #e8c46a), transparent);
    }

    /* ── Botones ── */
    .btn-group { display: flex; flex-direction: column; gap: 10px; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      padding: 13px 18px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #fff;
      transition: transform .16s, box-shadow .16s;
    }
    .btn:hover  { transform: translateY(-2px); }
    .btn:active { transform: scale(.97); }

    .btn-registry {
      background: linear-gradient(135deg, #d4a43a, #c9952a, #b87e1a);
      box-shadow: 0 4px 18px rgba(201,149,42,.38);
    }
    .btn-registry:hover { box-shadow: 0 7px 26px rgba(201,149,42,.52); }

    .btn-location {
      background: linear-gradient(135deg, #e04a8e, #c03580, #8b24a0);
      box-shadow: 0 4px 18px rgba(180,52,128,.32);
    }
    .btn-location:hover { box-shadow: 0 7px 26px rgba(180,52,128,.46); }

    /* ── Pie ── */
    .footer {
      margin-top: 18px;
      font-size: 11px;
      color: #b8a0c8;
      letter-spacing: .05em;
      line-height: 1.7;
    }
    .footer strong { color: var(--gold); font-weight: 700; }
  </style>
</head>
<body>

<div class="card">

  <!-- Imagen visible en la página (portrait, full detail) -->
  <a href="https://www.amazon.com/baby-reg/analiaandwilliam-ring-september-2026-buckley/3IODCW38XY4N9?ref_=cm_sw_r_apin_dp_XB4SSRJFS3HG8J47GC5H&language=en-US"
     target="_blank" rel="noopener">
    <img class="invite-img"
         src="invitation2.jpg"
         width="1083" height="1452"
         alt="Baby Shower Kianna – August 2, 2026 · 4:00 PM">
  </a>

  <div class="content">

    <p class="label">🦋 Open Invitation to take you directly to Gift registry</p>

    <div class="divider">
      <div class="divider-line"></div>
      <!-- mariposa SVG inline: cero petición HTTP extra -->
      <svg width="20" height="18" viewBox="0 0 90 80" fill="none" aria-hidden="true">
        <path d="M45 40 C30 10 5 5 10 30 C15 50 35 48 45 40Z" fill="#c9952a"/>
        <path d="M45 40 C60 10 85 5 80 30 C75 50 55 48 45 40Z" fill="#e04a8e"/>
        <path d="M45 40 C32 55 12 65 18 50 C24 38 38 44 45 40Z" fill="#c9952a" opacity=".7"/>
        <path d="M45 40 C58 55 78 65 72 50 C66 38 52 44 45 40Z" fill="#e04a8e" opacity=".7"/>
      </svg>
      <div class="divider-line"></div>
    </div>

    <div class="btn-group">

      <a class="btn btn-registry"
         href="https://www.amazon.com/baby-reg/analiaandwilliam-ring-september-2026-buckley/3IODCW38XY4N9?ref_=cm_sw_r_apin_dp_XB4SSRJFS3HG8J47GC5H&language=en-US"
         target="_blank" rel="noopener">
        <!-- bolsa de compras -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
        Amazon Baby Registry
      </a>

      <a class="btn btn-location"
         href="https://share.google/dul9C7xfuQYGo2kIc"
         target="_blank" rel="noopener">
        <!-- pin de mapa -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        View Event Location
      </a>

    </div>

    <p class="footer">
      <strong>12032 Holmes Point Dr NE</strong>, Kirkland, WA 98034<br>
      August 2, 2026 &middot; 4:00 PM
    </p>

  </div>
</div>

</body>
</html>
